<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login - GARRF</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: #f5f7fa; color: #333; }
.navbar { background: #0D3B66; padding: 15px 0; }
.navbar-brand { font-weight: 700; font-size: 24px; color: white !important; }
.admin-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); margin-top: 40px; margin-bottom: 40px; }
.form-label { font-weight: 500; color: #0D3B66; }
.login-screen { max-width: 400px; margin: 100px auto; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="../index.html">GARRF Admin Portal</a>
</div>
</nav>

<div class="container">
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="admin-container login-screen">
        <h3 class="text-center mb-4">Admin Login</h3>
        <form onsubmit="event.preventDefault(); handleLogin();">
            <div class="mb-3">
                <label class="form-label">User ID</label>
                <input type="text" id="login-user" class="form-control" value="admin" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="login-pass" class="form-control" value="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login to Edit</button>
            <div class="text-center mt-3">
                <a href="#" onclick="showChangePassword()">Change Password?</a>
            </div>
        </form>
    </div>

    <!-- CHANGE PASSWORD SCREEN -->
    <div id="change-pass-screen" class="admin-container login-screen" style="display:none;">
        <h3 class="text-center mb-4">Change Password</h3>
        <form onsubmit="event.preventDefault(); handleChangePassword();">
            <div class="mb-3">
                <label class="form-label">Secret Key</label>
                <input type="text" id="cp-secret" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Registered Mobile Number</label>
                <input type="text" id="cp-mobile" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" id="cp-newpass" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Update Password</button>
            <div class="text-center mt-3">
                <a href="#" onclick="showLogin()">Back to Login</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script>
let authData = {};

async function fetchAuthData() {
    try {
        const { data, error } = await supabaseClient
            .from('site_data')
            .select('content')
            .eq('id', 'admin_auth')
            .single();
        if (data && data.content) {
            authData = data.content;
        }
    } catch(e) { console.error("Error fetching auth", e); }
}

async function handleLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    
    await fetchAuthData();
    
    if (authData.username === user && authData.password === pass) {
        sessionStorage.setItem('adminMode', 'true');
        window.location.href = '../index.html';
    } else {
        alert("Invalid ID or Password.");
    }
}

function showChangePassword() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('change-pass-screen').style.display = 'block';
}

function showLogin() {
    document.getElementById('change-pass-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
}

async function handleChangePassword() {
    const secret = document.getElementById('cp-secret').value;
    const mobile = document.getElementById('cp-mobile').value;
    const newpass = document.getElementById('cp-newpass').value;
    
    await fetchAuthData();
    
    if (secret === authData.secret_key && mobile === "8919299180") {
        authData.password = newpass;
        try {
            const { error } = await supabaseClient
                .from('site_data')
                .upsert({ id: 'admin_auth', content: authData });
            if (error) throw error;
            alert("Password updated successfully!");
            showLogin();
            document.getElementById('login-pass').value = newpass;
        } catch(e) {
            alert("Failed to update password.");
        }
    } else {
        alert("Invalid Secret Key or Mobile Number.");
    }
}
</script>
</body>
</html>
